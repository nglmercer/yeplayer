name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Archive Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      - name: Zip Artifacts
        run: |
          zip -r ag-player-dist.zip dist package.json README.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ag-player-dist.zip
          generate_release_notes: true
