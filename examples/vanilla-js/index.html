<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yeplayer - Vanilla JS Example</title>
    <!-- Assuming the player is built and served from dist -->
    <link rel="stylesheet" href="../../styles/player.css">
    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 80%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            background: black;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <h1>yeplayer Vanilla Example</h1>

    <div class="container player-wrapper" id="player-container">
        <video id="video" crossorigin="anonymous"></video>
    </div>

    <script type="module">
        // In a real project, you would import from 'agnostic-player'
        // For this local example, we'll assume the script is available
        import { Player, createControls, createGestures, createHlsPlugin } from '../../dist/index.js';

        const video = document.getElementById('video');
        const container = document.getElementById('player-container');

        const player = new Player({
            media: video,
            container: container,
            autoplay: false
        });

        // Add Plugins (using the new plugin system)
        await player.usePlugin(createControls());
        await player.usePlugin(createGestures());
        await player.usePlugin(createHlsPlugin());

        // Set Source
        player.setSource('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8');
    </script>
</body>

</html>
