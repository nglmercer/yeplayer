<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu & Dropdown Example</title>
    <link rel="stylesheet" href="../styles/player.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #121212;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            margin-bottom: 20px;
            text-align: center;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        video {
            width: 100%;
            height: 100%;
        }

        .controls-bar {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
        }

        button.btn {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button.btn:hover {
            background: #444;
        }

        /* Custom dropdown style for the standalone example */
        .custom-dropdown-trigger {
            position: relative;
        }
    </style>
    <script src=" https://cdn.jsdelivr.net/npm/hls.js@1.6.15/dist/hls.min.js "></script>

    <script type="importmap">
    {
        "imports": {
            "hls.js": "https://cdn.jsdelivr.net/npm/hls.js@latest/+esm"
        }
    }
    </script>
</head>

<body>

    <div class="container">
        <h1>Player Menu & Dropdown Demo</h1>

        <div class="player-wrapper" id="player-container">
            <video id="video" playsinline>
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
                    type="video/mp4">
            </video>
        </div>

        <div class="controls-bar">
            <button id="settings-btn" class="btn">Settings (Menu)</button>

            <div class="custom-dropdown-trigger">
                <button id="more-btn" class="btn">More (Dropdown)</button>
                <div id="more-dropdown-container"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { Player, Menu, Dropdown, Controls, Gestures } from "../dist/index.js";

        // 1. Initialize Player
        const video = document.getElementById('video');
        const player = new Player({
            media: video,
            autoplay: false,
        });

        // Initialize Gestures
        const gestures = new Gestures(document.getElementById('player-container'), player);

        // 2. Configure Menu Items (Groups)
        const menuGroups = [
            {
                label: "Playback",
                items: [
                    {
                        type: "toggle",
                        id: "autoplay",
                        label: "Autoplay",
                        value: false, // Initial state
                        onChange: (val) => {
                            console.log("Autoplay toggled:", val);
                        }
                    },
                    {
                        type: "select",
                        id: "speed",
                        label: "Speed",
                        value: "1",
                        options: [
                            { value: "0.5", label: "0.5x" },
                            { value: "1", label: "Normal" },
                            { value: "1.5", label: "1.5x" },
                            { value: "2", label: "2x" }
                        ],
                        onChange: (val) => {
                            console.log("Speed changed to:", val);
                            player.setRate(parseFloat(val));
                        }
                    }
                ]
            },
            {
                label: "Quality",
                items: [
                    {
                        type: "select",
                        id: "quality",
                        label: "Quality",
                        value: "auto",
                        options: [
                            { value: "auto", label: "Auto" },
                            { value: "1080p", label: "1080p" },
                            { value: "720p", label: "720p" },
                            { value: "480p", label: "480p" }
                        ],
                        onChange: (val) => {
                            console.log("Quality set to:", val);
                        }
                    }
                ]
            }
        ];

        // 3. Create the Menu instance
        const container = document.getElementById('player-container');
        const menu = new Menu(container, menuGroups, { className: 'my-custom-menu' });

        // Add Controls with custom options (example)
        const controls = new Controls(player, container, {
            icons: {
                // Example: Customizing the play icon (making it green for demo)
                play: '<path d="M8 5v14l11-7z" fill="#4caf50" />'
            }
        });

        // Link internal settings button to menu
        controls.getSettingsButton().addEventListener('click', (e) => {
            e.stopPropagation();
            menu.toggle();
        });

        // Add a "More" (Dropdown) button to the right of controls
        const moreIcon = '<path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>';
        const moreBtn = controls.addButton('right', moreIcon, () => {
            dropdown.toggle();
        });

        // 4. Create a standalone Dropdown example, now integrated
        const dropdown = new Dropdown('custom-dropdown');

        // Create content for the dropdown
        const ddContent = document.createElement('div');
        ddContent.style.padding = '10px';
        ddContent.style.background = '#2a2a2a';
        ddContent.style.border = '1px solid #444';
        ddContent.style.borderRadius = '4px';
        ddContent.style.minWidth = '150px';

        const item1 = document.createElement('div');
        item1.textContent = "Share";
        item1.style.padding = "5px";
        item1.style.cursor = "pointer";
        item1.onclick = () => alert("Share clicked!");

        const item2 = document.createElement('div');
        item2.textContent = "Report";
        item2.style.padding = "5px";
        item2.style.cursor = "pointer";
        item2.onclick = () => alert("Report clicked!");

        ddContent.appendChild(item1);
        ddContent.appendChild(item2);

        dropdown.getElement().appendChild(ddContent);

        // Position the dropdown (absolute) relative to the container/button
        // We attach it to the container, and we'll need to position it manually or using simple CSS
        dropdown.getElement().style.position = 'absolute';
        dropdown.getElement().style.bottom = '60px'; // Approx height of controls
        dropdown.getElement().style.right = '50px'; // Approx position of more button
        dropdown.getElement().style.zIndex = '100';

        container.appendChild(dropdown.getElement());

        // Close menu/dropdown when clicking elsewhere
        document.addEventListener('click', (e) => {
            if (!moreBtn.contains(e.target) &&
                !dropdown.getElement().contains(e.target)) {
                dropdown.close();
            }
        });

        // Toggle menu with external button (keep if needed, otherwise optional)
        document.getElementById('settings-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            menu.toggle();
        });

        // External dropdown button (keep for demo or remove if fully integrated)
        document.getElementById('more-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            // Logic for external button if still needed...
        });

    </script>
</body>

</html>
